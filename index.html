<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editkaro.in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero-section">
        <div class="video-container"></div>
        <div class="dark-overlay"></div>
        <div class="content-box">
            <h1 class="main-heading">Editkaro.in</h1>
            <p class="subtitle">Elevating Visual Storytelling</p>
            <button class="action-button">View Our Work</button>
        </div>
    </section>

    <section class="portfolio-section">
        <div class="category-buttons">
            <button class="category-btn active">All</button>
            <button class="category-btn">Gaming</button>
            <button class="category-btn">Ads</button>
            <button class="category-btn">Anime</button>
        </div>
        <div class="work-grid">
            <div class="work-item">
                <div class="thumbnail"></div>
                <div class="item-details">
                    <h3 class="video-title">Epic Gaming Montage</h3>
                    <span class="category-tag">Gaming</span>
                </div>
            </div>
            <div class="work-item">
                <div class="thumbnail"></div>
                <div class="item-details">
                    <h3 class="video-title">Modern Sneaker Ad</h3>
                    <span class="category-tag">Ads</span>
                </div>
            </div>
            <div class="work-item">
                <div class="thumbnail"></div>
                <div class="item-details">
                    <h3 class="video-title">Anime Music Video</h3>
                    <span class="category-tag">Anime</span>
                </div>
            </div>
            <div class="work-item">
                <div class="thumbnail"></div>
                <div class="item-details">
                    <h3 class="video-title">Valorant Highlights</h3>
                    <span class="category-tag">Gaming</span>
                </div>
            </div>
            <div class="work-item">
                <div class="thumbnail"></div>
                <div class="item-details">
                    <h3 class="video-title">Tech Product Promo</h3>
                    <span class="category-tag">Ads</span>
                </div>
            </div>
            <div class="work-item">
                <div class="thumbnail"></div>
                <div class="item-details">
                    <h3 class="video-title">Cinematic Anime Edit</h3>
                    <span class="category-tag">Anime</span>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
